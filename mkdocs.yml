site_name: MorphUI
site_description: A creative and flexible UI extension for Kivy with dynamic theming and modern components.
site_author: j4ggr
site_url: https://j4ggr.github.io/MorphUI/

theme:
  name: material
  custom_dir: overrides
  # logo: img/logo_w.ico
  # favicon: img/logo.ico
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
      primary: teal
      accent: amber

  features:
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.tooltips
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - navigation.indexes
    - navigation.tabs
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.footer
    - toc.follow

repo_name: j4ggr/MorphUI
repo_url: https://github.com/j4ggr/MorphUI

plugins:
  search: null
  mkdocstrings:
    handlers:
      python:
        options:
          docstring_style: numpy
          docstring_section_style: spacy
          heading_level: 2
          merge_init_into_class: true
          show_bases: true
          show_source: false
          show_root_heading: true
          show_symbol_type_heading: true
          show_symbol_type_toc: true
          show_docstring_functions: true
          inherited_members: false
          members_order: source
          group_by_category: true
          show_if_no_docstring: false
          filters:
            - "!^_"
            - "^__init__"

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - css/custom-colors.css

